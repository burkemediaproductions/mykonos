<body>
  <main class="reservation-page">
    <section class="reservation-shell">
      <div class="reservation-header">
        <p class="eyebrow">Reserve a Table</p>
        <h1>Book your table at Mykonos</h1>
        <p class="intro">
          Submit your reservation request and we’ll text and email a confirmation.
        </p>
      </div>

      <form id="reservation-form" class="reservation-form" novalidate>
        <div class="grid">
          <label>
            <span>First name</span>
            <input type="text" name="first_name" required maxlength="60">
          </label>

          <label>
            <span>Last name</span>
            <input type="text" name="last_name" required maxlength="60">
          </label>

          <label>
            <span>Email</span>
            <input type="email" name="email" required maxlength="120">
          </label>

          <label>
            <span>Phone</span>
            <input type="tel" name="phone" required maxlength="25" placeholder="+1 760 555 1234">
          </label>

          <label>
            <span>Date</span>
            <input type="date" name="reservation_date" required>
          </label>

          <label>
            <span>Time</span>
            <select name="reservation_time" required>
              <option value="">Select a time</option>
            </select>
          </label>

          <label>
            <span>Party size</span>
            <select name="party_size" required>
              <option value="">Select party size</option>
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10">10</option>
            </select>
          </label>

          <label>
            <span>Occasion</span>
            <select name="occasion">
              <option value="">Optional</option>
              <option value="birthday">Birthday</option>
              <option value="anniversary">Anniversary</option>
              <option value="date-night">Date night</option>
              <option value="business">Business</option>
              <option value="other">Other</option>
            </select>
          </label>
        </div>

        <label class="notes">
          <span>Notes</span>
          <textarea name="notes" rows="5" maxlength="600" placeholder="High chair, accessibility note, outdoor preference, etc."></textarea>
        </label>

        <label class="checkbox">
          <input type="checkbox" name="sms_opt_in" value="yes" checked>
          <span>Text me reservation updates</span>
        </label>

        <div class="actions">
          <button type="submit" id="submit-button">Request reservation</button>
          <p class="status" id="form-status" aria-live="polite"></p>
        </div>
      </form>
    </section>
  </main>

  <script src="/assets/js/reservations.js" defer></script>
